<VirtualHost *:80>
    ServerName localhost

    # Serve the HTML frontend
    DocumentRoot /var/www/html

    # Route POST /process to the WSGI app
    WSGIScriptAlias	/process 	/var/www/xlsxapp/app.wsgi
	WSGIScriptAlias /import 	/var/www/xlsxapp/app.wsgi

	<Location /process>
		Require all granted
	</Location>

	<Location /import>
		Require all granted
	</Location>

</VirtualHost>
